# ==============================================================
# Auto-Apply CI/CD Pipeline — GitHub Actions
# ==============================================================
# Triggers on push and pull_request to all branches.
# Three parallel jobs: backend-ci, frontend-ci, docker-build.
# ==============================================================

name: Auto-Apply CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main, master]

jobs:
  # --- Backend CI ---
  backend-ci:
    name: Backend — Lint, Format, Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint with Flake8
        run: flake8 app/ tests/ --count --statistics

      - name: Check formatting with Black
        run: black --check app/ tests/

      - name: Check import ordering with isort
        run: isort --check-only app/ tests/

      - name: Run tests with pytest
        run: pytest tests/ -v --tb=short

  # --- Frontend CI ---
  frontend-ci:
    name: Frontend — Lint, Format, Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint with ESLint
        run: npm run lint

      - name: Check formatting with Prettier
        run: npx prettier --check "src/**/*.{js,jsx,css}"

      - name: Build production bundle
        run: npm run build

  # --- Docker Build Verification ---
  docker-build:
    name: Docker — Build Verification
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t auto-apply-backend:test ./backend

      - name: Build frontend Docker image
        run: docker build -t auto-apply-frontend:test ./frontend
