# ==============================================================
# Auto-Apply — Docker Compose (Development)
# ==============================================================
# Services: PostgreSQL 16, FastAPI backend, React/Vite frontend.
# Usage: docker-compose up --build
# ==============================================================

services:
  # --- PostgreSQL Database ---
  db:
    image: postgres:16-alpine
    container_name: autoapply-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-autoapply}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-autoapply_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-autoapply} -d ${POSTGRES_DB:-autoapply_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- FastAPI Backend ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: autoapply-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-autoapply}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-autoapply_db}
      SECRET_KEY: ${SECRET_KEY:-dev-docker-secret-key}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      ALGORITHM: ${ALGORITHM:-HS256}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      CORS_ORIGINS: ${CORS_ORIGINS:-'["http://localhost:5173"]'}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ADZUNA_APP_ID: ${ADZUNA_APP_ID}
      ADZUNA_APP_KEY: ${ADZUNA_APP_KEY}
      UPLOAD_DIR: ${UPLOAD_DIR:-./uploads}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app  # Hot reload
      - upload_data:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # --- React/Vite Frontend (Development Mode) ---
  frontend:
    image: node:20-alpine
    container_name: autoapply-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      # vite.config.js reads VITE_API_TARGET; default is 127.0.0.1:8000
      # so local dev works, and inside Compose we point at the backend
      # service name instead.
      VITE_API_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app  # Hot reload for development
      - /app/node_modules  # Preserve node_modules in container
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  postgres_data:
    driver: local
  upload_data:
    driver: local
